version: '3.8'
services:
  server:
    build: .
    ports:
      - "8080:8080"
    command: python -m federated.server --model EleutherAI/pythia-70m --rounds 3 --port 8080
    volumes:
      - ./output:/app/output
      - ./config:/app/config

  client-1:
    build: .
    depends_on:
      - server
    command: python fed_client.py --server server --port 8080 --client-id client-1
    volumes:
      - ./output:/app/output

  client-2:
    build: .
    depends_on:
      - server
    command: python fed_client.py --server server --port 8080 --client-id client-2
    volumes:
      - ./output:/app/output

  client-3:
    build: .
    depends_on:
      - server
    command: python fed_client.py --server server --port 8080 --client-id client-3
    volumes:
      - ./output:/app/output
